<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课堂趣味大冒险 </title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;min-height:100vh;overflow-x:hidden;
  background:linear-gradient(160deg,#fef9c3 0%,#fef3c7 40%,#fde68a 100%);
}
#app{min-height:100vh}

/* ===== Setup ===== */
.setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem}
.setup-title{font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem;text-align:center;letter-spacing:.05em}
.setup-subtitle{font-size:1.1rem;color:#78716c;margin-bottom:2rem;text-align:center}
.setup-card{background:#fff;border-radius:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);padding:2rem;width:100%;max-width:560px}
.setup-section-title{font-size:1rem;font-weight:700;color:#44403c;margin-bottom:.75rem}
.player-count-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.5rem;margin-bottom:1.5rem}
.count-btn{width:100%;aspect-ratio:1;border-radius:.75rem;border:2px solid #e7e5e4;background:#fff;font-size:1.2rem;font-weight:700;color:#57534e;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.count-btn:hover{border-color:#f59e0b;color:#f59e0b;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,.2)}
.count-btn.active{background:#f59e0b;border-color:#f59e0b;color:#fff;box-shadow:0 4px 12px rgba(245,158,11,.3)}
.name-inputs{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem;max-height:360px;overflow-y:auto;padding-right:.25rem}
.name-row{display:flex;align-items:center;gap:.5rem}
.name-color-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.name-label{font-size:.85rem;font-weight:600;color:#78716c;width:50px;flex-shrink:0}
.name-input{flex:1;padding:.5rem .75rem;border:2px solid #e7e5e4;border-radius:.5rem;font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.name-input:focus{border-color:#f59e0b}
.start-btn{width:100%;padding:.85rem;border:none;border-radius:.75rem;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .3s;letter-spacing:.05em}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,.3)}
.start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ===== Game Screen ===== */
.game-screen{display:flex;min-height:100vh;padding:1rem;gap:1rem}
.board-area{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:1rem;
  background:linear-gradient(160deg,#fef9c3 0%,#fef3c7 40%,#fde68a 100%);
}

/* ===== Board Container - Beautiful Map ===== */
.board-container{
  position:relative;
  border-radius:2rem;
  flex-shrink:0;
  overflow:hidden;
  /* Rich background: grass + parchment */
  background:
    /* Top light overlay */
    linear-gradient(180deg, rgba(255,251,235,.7) 0%, transparent 30%),
    /* Warm parchment base */
    radial-gradient(ellipse 120% 80% at 50% 100%, #fde68a 0%, transparent 60%),
    radial-gradient(ellipse 100% 60% at 50% 0%, #d9f99d 0%, transparent 50%),
    /* Grass-like bottom */
    linear-gradient(180deg, #ecfccb 0%, #f7fee7 15%, #fffbeb 40%, #fef3c7 70%, #fde68a 100%);
  box-shadow:
    0 12px 40px rgba(0,0,0,.1),
    0 0 0 4px #a3e635,
    0 0 0 8px #65a30d,
    inset 0 2px 8px rgba(255,255,255,.6);
}
.board-container::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  /* Subtle topographic/contour lines */
  background-image:
    radial-gradient(ellipse 600px 200px at 20% 80%, rgba(134,239,172,.2) 0%, transparent 70%),
    radial-gradient(ellipse 500px 180px at 75% 60%, rgba(253,224,71,.15) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 30%, rgba(186,230,253,.12) 0%, transparent 70%);
}
/* Decorative scattered flowers/elements */
.board-container::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle 6px at 3% 90%, rgba(251,113,133,.35) 0%, transparent 100%),
    radial-gradient(circle 4px at 6% 88%, rgba(251,113,133,.2) 0%, transparent 100%),
    radial-gradient(circle 5px at 97% 85%, rgba(251,113,133,.3) 0%, transparent 100%),
    radial-gradient(circle 7px at 95% 12%, rgba(96,165,250,.25) 0%, transparent 100%),
    radial-gradient(circle 4px at 92% 10%, rgba(96,165,250,.15) 0%, transparent 100%),
    radial-gradient(circle 6px at 4% 15%, rgba(52,211,153,.3) 0%, transparent 100%),
    radial-gradient(circle 8px at 50% 95%, rgba(251,191,36,.25) 0%, transparent 100%),
    radial-gradient(circle 5px at 50% 5%, rgba(167,139,250,.2) 0%, transparent 100%),
    radial-gradient(circle 3px at 30% 50%, rgba(251,146,60,.15) 0%, transparent 100%),
    radial-gradient(circle 3px at 70% 45%, rgba(74,222,128,.15) 0%, transparent 100%);
}
.board-inner{position:relative;z-index:1}

/* ===== Decorative SVG Elements ===== */
.board-deco{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* ===== Tiles ===== */
.tile{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;cursor:default;z-index:2}

/* Normal tiles - rounded cards with soft shadow */
.tile-normal{
  border-radius:1rem;
  background:linear-gradient(145deg,#ffffff,#fefce8);
  border:2.5px solid #a8a29e;
  box-shadow:0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9);
}
.tile-normal::after{content:'';position:absolute;top:3px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,rgba(168,162,158,.4),transparent);border-radius:2px}

/* Backward tiles - angular diamond-ish with red glow */
.tile-backward{
  border-radius:12% 50% 12% 50%;
  background:linear-gradient(145deg,#fff5f5,#fecaca);
  border:2.5px solid #ef4444;
  box-shadow:0 4px 12px rgba(239,68,68,.15),0 0 20px rgba(239,68,68,.08),inset 0 1px 0 rgba(255,255,255,.8);
}
.tile-backward::after{content:'';position:absolute;top:3px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,rgba(239,68,68,.5),transparent);border-radius:2px}

/* Roll again tiles - blue five-pointed star via inline SVG */
.tile-rollagain{
  background:transparent;
  border:none;
  box-shadow:none;
  overflow:visible;
}
.tile-rollagain .star-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  filter:drop-shadow(0 4px 10px rgba(59,130,246,.35));
}
.tile-rollagain .tile-content{
  position:relative;
  z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;
}

/* Start / Finish - golden circle with glow */
.tile-start,.tile-finish{
  border-radius:50%;
  background:linear-gradient(145deg,#fef9c3,#fde047);
  border:3px solid #ca8a04;
  box-shadow:0 4px 16px rgba(245,158,11,.25),0 0 24px rgba(251,191,36,.15),inset 0 2px 0 rgba(255,255,255,.8);
}
.tile-start::after,.tile-finish::after{content:'';position:absolute;top:3px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,rgba(202,138,4,.5),transparent);border-radius:2px}

/* Tile text styling */
.tile-name{
  font-size:.78rem;font-weight:800;color:#292524;text-align:center;line-height:1.15;
  letter-spacing:.04em;
  text-shadow:0 1px 0 rgba(255,255,255,.6);
  padding:0 4px;
}
.tile-backward .tile-name{color:#991b1b}
.tile-rollagain .tile-name{color:#1e40af;text-shadow:0 1px 0 rgba(255,255,255,.8)}
.tile-start .tile-name,.tile-finish .tile-name{color:#92400e;font-size:.82rem;letter-spacing:.06em}

/* Tile type indicator */
.tile-marker{
  width:8px;height:8px;border-radius:50%;margin-bottom:3px;
  box-shadow:0 0 0 2px rgba(255,255,255,.5);
}
.tile-normal .tile-marker{background:#94a3b8}
.tile-backward .tile-marker{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.4)}
.tile-rollagain .tile-marker{background:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,.4)}
.tile-start .tile-marker,.tile-finish .tile-marker{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.4)}

/* Tile badge */
.tile-badge{position:absolute;top:4px;right:4px;font-size:.5rem;font-weight:800;padding:1px 5px;border-radius:9999px;color:#fff}
.tile-badge-backward{background:#ef4444}
.tile-badge-rollagain{background:#3b82f6;color:#fff;top:4px;right:4px}

/* ===== Player Tokens ===== */
.player-token{position:absolute;width:30px;height:30px;border-radius:50%;border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;color:#fff;z-index:10;text-shadow:0 1px 2px rgba(0,0,0,.3);cursor:pointer;transition:left .3s ease,top .3s ease}
.player-token:hover{transform:scale(1.35);box-shadow:0 0 0 5px rgba(245,158,11,.4),0 6px 16px rgba(0,0,0,.3);z-index:30}
.player-token.rolling-token{animation:tokenRollPulse .3s ease-in-out infinite;z-index:30}
@keyframes tokenRollPulse{0%,100%{transform:scale(1.2);box-shadow:0 0 0 4px rgba(245,158,11,.5),0 4px 12px rgba(0,0,0,.2)}50%{transform:scale(1.4);box-shadow:0 0 0 8px rgba(245,158,11,.2),0 4px 12px rgba(0,0,0,.2)}}

/* ===== Sidebar ===== */
.sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:.75rem}
.sidebar-card{background:#fff;border-radius:1rem;padding:1rem;box-shadow:0 4px 16px rgba(0,0,0,.05)}
.game-title{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.hint-text{font-size:.82rem;color:#a8a29e;text-align:center;margin-top:.3rem;font-weight:500}
.dice-area{display:flex;flex-direction:column;align-items:center;gap:.75rem}
.dice{width:80px;height:80px;background:#fff;border-radius:1rem;border:3px solid #d6d3d1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:10px;gap:2px;box-shadow:0 4px 12px rgba(0,0,0,.08);transition:border-color .2s}
.dice.rolling{animation:diceShake .12s ease-in-out infinite;border-color:#f59e0b}
@keyframes diceShake{0%{transform:rotate(-5deg) scale(1.05)}25%{transform:rotate(5deg) scale(.95)}50%{transform:rotate(-3deg) scale(1.02)}75%{transform:rotate(3deg) scale(.98)}100%{transform:rotate(-5deg) scale(1.05)}}
.dice-dot{width:100%;height:100%;border-radius:50%;background:transparent}
.dice-dot.visible{background:#1c1917;box-shadow:inset 0 2px 3px rgba(0,0,0,.3)}
.dice-result{font-size:.85rem;color:#78716c;font-weight:600;min-height:1.2em;text-align:center;line-height:1.3}
.player-list{display:flex;flex-direction:column;gap:.4rem}
.player-item{display:flex;align-items:center;gap:.5rem;padding:.4rem .5rem;border-radius:.5rem;font-size:.8rem;transition:background .2s;cursor:pointer}
.player-item:hover{background:#fef3c7}
.player-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.player-item-name{flex:1;color:#44403c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-item-pos{color:#78716c;font-size:.7rem;font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:.5rem;font-size:.7rem;color:#78716c}
.legend-item{display:flex;align-items:center;gap:.3rem}
.legend-dot{width:12px;height:12px;border-radius:3px}

/* ===== Encouragement ===== */
.encouragement{position:absolute;pointer-events:none;z-index:100;font-size:1.3rem;font-weight:900;animation:floatUp 1.6s ease-out forwards;white-space:nowrap}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.5)}20%{opacity:1;transform:translateY(-10px) scale(1.2)}40%{opacity:1;transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(.8)}}

/* ===== FULLSCREEN Effect Message ===== */
.fullscreen-effect{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;animation:fxFadeIn .35s ease-out}
.fullscreen-effect.backward-fx{background:rgba(239,68,68,.88)}
.fullscreen-effect.rollagain-fx{background:rgba(37,99,235,.88)}
.fullscreen-effect .fx-emoji{font-size:5rem;margin-bottom:.5rem;animation:fxBounce .6s ease-out}
.fullscreen-effect .fx-text{font-size:4.5rem;font-weight:900;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.15),0 0 40px rgba(255,255,255,.3);letter-spacing:.1em;animation:fxBounce .6s ease-out .1s both}
.fullscreen-effect .fx-sub{font-size:1.5rem;color:rgba(255,255,255,.9);margin-top:.5rem;font-weight:600;animation:fxBounce .6s ease-out .2s both}
@keyframes fxFadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes fxBounce{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.1)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}

/* ===== Victory Overlay ===== */
.victory-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:3000;animation:fadeIn .5s ease-out}
.victory-card{background:#fff;border-radius:2rem;padding:3rem;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:victoryBounce .6s ease-out;max-width:420px;width:90%}
.victory-crown{font-size:4rem;margin-bottom:.5rem;animation:crownFloat 2s ease-in-out infinite}
@keyframes crownFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.victory-title{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.victory-name{font-size:1.3rem;color:#44403c;margin-bottom:1.5rem;font-weight:600}
.restart-btn{padding:.75rem 2.5rem;border:none;border-radius:.75rem;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;transition:all .2s}
.restart-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,.3)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes victoryBounce{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}

/* ===== Confetti ===== */
.confetti{position:fixed;border-radius:2px;z-index:3001;pointer-events:none;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== Responsive ===== */
@media(max-width:1100px){.game-screen{flex-direction:column;align-items:center}.sidebar{width:100%;max-width:600px;flex-direction:row;flex-wrap:wrap}.sidebar-card{flex:1;min-width:200px}}
@media(max-width:600px){.setup-title{font-size:2rem}.player-count-grid{grid-template-columns:repeat(4,1fr)}.sidebar{flex-direction:column}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== Game Data =====
var TILE_W = 108, TILE_H = 80;

var PLAYER_COLORS = [
  '#ef4444','#3b82f6','#22c55e','#f97316',
  '#8b5cf6','#ec4899','#06b6d4','#eab308',
  '#84cc16','#6366f1','#f43f5e','#14b8a6'
];

var ENCOURAGEMENTS = [
  '好厉害!','太棒了!','真不错!','冲冲冲!',
  '无敌了!','帅呆了!','绝了!','666!',
  '超赞!','牛哇!','给力!','威武!'
];

// Irregular winding path positions - hand-crafted organic layout
var TILE_POSITIONS = [
  // Row 0: bottom, drifting right
  {x:50,  y:740},{x:190, y:710},{x:340, y:735},{x:480, y:695},{x:630, y:720},{x:775, y:690},{x:920, y:715},
  // Sweep up-left with diagonal curve
  {x:1000,y:595},{x:855, y:560},{x:700, y:585},{x:555, y:550},{x:400, y:575},{x:240, y:545},{x:95,  y:565},
  // Sweep right with different rhythm
  {x:155, y:435},{x:310, y:410},{x:460, y:430},{x:610, y:400},{x:760, y:425},{x:910, y:395},{x:1050,y:420},
  // Sweep up-left tighter
  {x:990, y:285},{x:840, y:260},{x:690, y:280},{x:535, y:250},{x:380, y:270},{x:220, y:245},{x:90,  y:265},
  // Final stretch right to victory
  {x:170, y:140},{x:335, y:115},{x:490, y:135},{x:640, y:105},{x:795, y:125},{x:935, y:100},{x:1080,y:120}
];

var MAP_TILES = [
  {id:0,  name:'起点',    type:'start'},
  {id:1,  name:'快乐出发',type:'normal'},
  {id:2,  name:'摇滚舞台',type:'normal'},
  {id:3,  name:'时光隧道',type:'backward',effect:-2},
  {id:4,  name:'彩虹桥',  type:'normal'},
  {id:5,  name:'迷失森林',type:'normal'},
  {id:6,  name:'企鹅乐园',type:'rollAgain'},
  {id:7,  name:'云端漫步',type:'normal'},
  {id:8,  name:'龙之巢穴',type:'backward',effect:-3},
  {id:9,  name:'深海探险',type:'normal'},
  {id:10, name:'甜蜜蛋糕',type:'normal'},
  {id:11, name:'梦幻城堡',type:'normal'},
  {id:12, name:'月光湖畔',type:'normal'},
  {id:13, name:'恐龙世界',type:'backward',effect:-2},
  {id:14, name:'秘密花园',type:'normal'},
  {id:15, name:'暴风雪山',type:'backward',effect:-3},
  {id:16, name:'太空站',  type:'rollAgain'},
  {id:17, name:'仙女池',  type:'normal'},
  {id:18, name:'金币雨',  type:'rollAgain'},
  {id:19, name:'魔镜迷宫',type:'backward',effect:-2},
  {id:20, name:'冰淇淋山',type:'normal'},
  {id:21, name:'火山岛',  type:'backward',effect:-3},
  {id:22, name:'酷热沙漠',type:'normal'},
  {id:23, name:'机器人城',type:'normal'},
  {id:24, name:'魔法喷泉',type:'rollAgain'},
  {id:25, name:'蜜糖陷阱',type:'backward',effect:-2},
  {id:26, name:'仙女祝福',type:'normal'},
  {id:27, name:'王者之路',type:'normal'},
  {id:28, name:'糖果世界',type:'normal'},
  {id:29, name:'蘑菇小屋',type:'normal'},
  {id:30, name:'极光草原',type:'backward',effect:-2},
  {id:31, name:'星空塔',  type:'rollAgain'},
  {id:32, name:'翡翠湖',  type:'normal'},
  {id:33, name:'胜利大道',type:'normal'},
  {id:34, name:'终点',    type:'finish'}
];

var TOTAL_TILES = MAP_TILES.length;
var BOARD_W = 1220;
var BOARD_H = 840;

// ===== State =====
var state = {
  phase:'setup', players:[], isRolling:false,
  winner:null, diceValue:1, lastRollPlayerId:null, consecutiveRolls:0
};
var selectedCount = 0;

// ===== Utility =====
function delay(ms){return new Promise(function(r){setTimeout(r,ms)})}

function getTileCenter(id){
  var p=TILE_POSITIONS[id];
  return {cx:p.x+TILE_W/2, cy:p.y+TILE_H/2};
}

function getTokenOffset(idx){
  var pos=[[0,0],[28,0],[-28,0],[0,26],[28,26],[-28,26],[0,-24],[28,-24],[-28,-24],[0,50],[28,50],[-28,50]];
  var i=Math.min(idx,pos.length-1);
  return {dx:pos[i][0],dy:pos[i][1]};
}

function randEncouragement(){return ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]}

// ===== Decorative Background SVG Elements =====
function generateDecorativeSVG(){
  var svg='';
  // Scattered trees (simple triangle + trunk shapes)
  var trees = [
    {x:25, y:760, s:.7, c:'#16a34a'},
    {x:960,y:580, s:.6, c:'#15803d'},
    {x:460,y:420, s:.8, c:'#22c55e'},
    {x:60,  y:280, s:.65,c:'#16a34a'},
    {x:1060,y:140, s:.5, c:'#15803d'},
    {x:730,y:755, s:.55,c:'#22c55e'},
    {x:170,y:555, s:.6, c:'#16a34a'},
    {x:1000,y:310, s:.5, c:'#15803d'},
  ];
  trees.forEach(function(t){
    var h=30*t.s, w=22*t.s, tw=4*t.s;
    svg+='<g opacity="0.35">';
    // trunk
    svg+='<rect x="'+(t.x-tw/2)+'" y="'+(t.y-h*.3)+'" width="'+tw+'" height="'+(h*.4)+'" fill="#92400e" rx="1"/>';
    // canopy layers
    svg+='<polygon points="'+(t.x-w/2)+','+(t.y-h*.25)+' '+(t.x)+','+(t.y-h)+' '+(t.x+w/2)+','+(t.y-h*.25)+'" fill="'+t.c+'"/>';
    svg+='<polygon points="'+(t.x-w*.4)+','+(t.y-h*.45)+' '+(t.x)+','+(t.y-h*1.15)+' '+(t.x+w*.4)+','+(t.y-h*.45)+'" fill="'+t.c+'" opacity="0.8"/>';
    svg+='</g>';
  });

  // Scattered clouds
  var clouds = [
    {x:180, y:55, s:1},
    {x:650, y:35, s:.8},
    {x:1050,y:50, s:.6},
    {x:400, y:470, s:.5},
    {x:850, y:195, s:.4},
  ];
  clouds.forEach(function(c){
    var r=14*c.s;
    svg+='<g opacity="0.15">';
    svg+='<circle cx="'+c.x+'" cy="'+c.y+'" r="'+r+'" fill="#fff"/>';
    svg+='<circle cx="'+(c.x+r*1.1)+'" cy="'+(c.y-r*.3)+'" r="'+(r*.85)+'" fill="#fff"/>';
    svg+='<circle cx="'+(c.x-r*.9)+'" cy="'+(c.y-r*.2)+'" r="'+(r*.7)+'" fill="#fff"/>';
    svg+='<circle cx="'+(c.x+r*.5)+'" cy="'+(c.y-r*.6)+'" r="'+(r*.6)+'" fill="#fff"/>';
    svg+='</g>';
  });

  // Scattered flowers (small colored dots with stems)
  var flowers = [
    {x:80,  y:680, c:'#f472b6'},{x:520, y:660, c:'#fb923c'},
    {x:870, y:670, c:'#a78bfa'},{x:310, y:530, c:'#f472b6'},
    {x:770, y:510, c:'#fb923c'},{x:50,  y:460, c:'#a78bfa'},
    {x:580, y:380, c:'#f472b6'},{x:1020,y:370, c:'#fb923c'},
    {x:140, y:210, c:'#a78bfa'},{x:500, y:195, c:'#f472b6'},
    {x:830, y:220, c:'#fb923c'},{x:1090,y:70,  c:'#a78bfa'},
    {x:350, y:100, c:'#f472b6'},{x:700, y:75,  c:'#fb923c'},
  ];
  flowers.forEach(function(f){
    // stem
    svg+='<line x1="'+f.x+'" y1="'+f.y+'" x2="'+f.x+'" y2="'+(f.y+10)+'" stroke="#16a34a" stroke-width="1.5" opacity="0.3"/>';
    // petals
    var pr=3.5;
    for(var a=0;a<5;a++){
      var ang=a*Math.PI*2/5-Math.PI/2;
      svg+='<circle cx="'+(f.x+Math.cos(ang)*pr)+'" cy="'+(f.y+Math.sin(ang)*pr)+'" r="2.5" fill="'+f.c+'" opacity="0.3"/>';
    }
    svg+='<circle cx="'+f.x+'" cy="'+f.y+'" r="2" fill="#fbbf24" opacity="0.35"/>';
  });

  // Small bushes (bumpy green shapes)
  var bushes = [
    {x:130, y:750, s:1},{x:710, y:560, s:.7},{x:940, y:430, s:.6},
    {x:40,  y:350, s:.8},{x:1020,y:170, s:.5},{x:580, y:90,  s:.6},
  ];
  bushes.forEach(function(b){
    var r=8*b.s;
    svg+='<g opacity="0.2">';
    svg+='<circle cx="'+b.x+'" cy="'+b.y+'" r="'+r+'" fill="#22c55e"/>';
    svg+='<circle cx="'+(b.x+r*.8)+'" cy="'+(b.y-r*.2)+'" r="'+(r*.7)+'" fill="#16a34a"/>';
    svg+='<circle cx="'+(b.x-r*.7)+'" cy="'+(b.y-r*.1)+'" r="'+(r*.65)+'" fill="#22c55e"/>';
    svg+='</g>';
  });

  return svg;
}

// ===== SVG Curved Paths - colorful winding trails =====
function generatePathSVG(){
  var svg='';
  // Draw a thicker background path for "road" feel
  for(var i=0;i<TOTAL_TILES-1;i++){
    var a=getTileCenter(i), b=getTileCenter(i+1);
    var dx=b.cx-a.cx, dy=b.cy-a.cy;
    var len=Math.sqrt(dx*dx+dy*dy);
    var mx=(a.cx+b.cx)/2, my=(a.cy+b.cy)/2;
    var nx=-dy/len, ny=dx/len;
    var curvature = (i%2===0?1:-1)*18 + Math.sin(i*0.7)*14;
    var cx=mx+nx*curvature, cy=my+ny*curvature;

    // Shadow/road base
    svg+='<path d="M'+a.cx+','+a.cy+' Q'+cx+','+cy+' '+b.cx+','+b.cy+'" stroke="#d6d3d1" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.3"/>';
    // Colored trail
    var hue = (i * 17) % 360;
    var trailColor = 'hsl('+hue+',50%,70%)';
    svg+='<path d="M'+a.cx+','+a.cy+' Q'+cx+','+cy+' '+b.cx+','+b.cy+'" stroke="'+trailColor+'" stroke-width="5" fill="none" stroke-dasharray="12,6" stroke-linecap="round" opacity="0.55"/>';

    // Direction arrow
    var t=0.5;
    var px=(1-t)*(1-t)*a.cx+2*(1-t)*t*cx+t*t*b.cx;
    var py=(1-t)*(1-t)*a.cy+2*(1-t)*t*cy+t*t*b.cy;
    var tdx=2*(1-t)*(cx-a.cx)+2*t*(b.cx-cx);
    var tdy=2*(1-t)*(cy-a.cy)+2*t*(b.cy-cy);
    var ta=Math.atan2(tdy,tdx);
    var as=8;
    svg+='<polygon points="'+px+','+py+' '+(px+as*Math.cos(ta+2.5))+','+(py+as*Math.sin(ta+2.5))+' '+(px+as*Math.cos(ta-2.5))+','+(py+as*Math.sin(ta-2.5))+'" fill="#9ca3af" opacity="0.5"/>';
  }
  return svg;
}

// ===== Dice =====
var DICE_PATTERNS={1:[4],2:[2,6],3:[2,4,6],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function renderDiceFace(v){
  var active=DICE_PATTERNS[v]||[];
  var h='';
  for(var i=0;i<9;i++) h+='<div class="dice-dot'+(active.indexOf(i)>=0?' visible':'')+'"></div>';
  return h;
}

// ===== Render: Setup =====
function renderSetup(){
  var btns='';
  for(var i=1;i<=12;i++) btns+='<button class="count-btn'+(selectedCount===i?' active':'')+'" data-count="'+i+'">'+i+'</button>';
  var inputs='';
  if(selectedCount>0){
    inputs='<div class="name-inputs">';
    for(var j=0;j<selectedCount;j++){
      var c=PLAYER_COLORS[j]; var dn='玩家'+(j+1);
      inputs+='<div class="name-row"><div class="name-color-dot" style="background:'+c+'"></div><span class="name-label">P'+(j+1)+'</span><input class="name-input" type="text" data-player="'+j+'" placeholder="'+dn+'" value="'+dn+'" maxlength="8"/></div>';
    }
    inputs+='</div>';
  }
  return '<div class="setup-screen">'+
    '<div class="setup-title">羊老师课堂趣味大冒险</div>'+
    '<div class="setup-subtitle">选择参赛人数，自定义角色名称，开启欢乐之旅！</div>'+
    '<div class="setup-card">'+
    '<div class="setup-section-title">选择参赛人数</div>'+
    '<div class="player-count-grid">'+btns+'</div>'+
    (selectedCount>0?'<div class="setup-section-title">角色名称</div>':'')+
    inputs+
    '<button class="start-btn" id="start-btn" '+(selectedCount===0?'disabled':'')+'>开始游戏</button>'+
    '</div></div>';
}

// ===== Render: Board =====
function renderBoard(){
  var tiles='';
  for(var i=0;i<TOTAL_TILES;i++){
    var t=MAP_TILES[i], p=TILE_POSITIONS[i];
    var cls='tile tile-'+t.type, badge='', inner='';
    if(t.type==='backward'){
      badge='<span class="tile-badge tile-badge-backward">'+Math.abs(t.effect)+'</span>';
    }else if(t.type==='rollAgain'){
      badge='<span class="tile-badge tile-badge-rollagain">+1</span>';
    }
    if(t.type==='rollAgain'){
      var sw=TILE_W+24, sh=TILE_H+24;
      var cx=sw/2, cy=sh/2;
      var or=Math.min(sw,sh)/2-2, ir=or*0.42;
      var pts='';
      for(var j=0;j<10;j++){
        var ang=-Math.PI/2+j*Math.PI/5;
        var r=j%2===0?or:ir;
        pts+=(cx+Math.cos(ang)*r)+','+(cy+Math.sin(ang)*r)+' ';
      }
      var ir2=or-5, ir3=ir+3;
      var pts2='';
      for(var k=0;k<10;k++){
        var ang2=-Math.PI/2+k*Math.PI/5;
        var r2=k%2===0?ir2:ir3;
        pts2+=(cx+Math.cos(ang2)*r2)+','+(cy+Math.sin(ang2)*r2)+' ';
      }
      inner='<div class="star-wrap"><svg width="'+sw+'" height="'+sh+'" viewBox="0 0 '+sw+' '+sh+'">'+
        '<polygon points="'+pts.trim()+'" fill="#2563eb"/>'+
        '<polygon points="'+pts2.trim()+'" fill="#dbeafe"/>'+
        '</svg></div>'+
        '<div class="tile-content"><div class="tile-marker"></div><span class="tile-name">'+t.name+'</span>'+badge+'</div>';
    }else{
      inner='<div class="tile-marker"></div><span class="tile-name">'+t.name+'</span>'+badge;
    }
    tiles+='<div class="'+cls+'" style="left:'+p.x+'px;top:'+p.y+'px;width:'+TILE_W+'px;height:'+TILE_H+'px;" data-tile="'+t.id+'">'+inner+'</div>';
  }

  // Background decorations SVG layer
  var decoSVG='<svg class="board-deco" viewBox="0 0 '+BOARD_W+' '+BOARD_H+'" preserveAspectRatio="xMidYMid meet">'+generateDecorativeSVG()+'</svg>';
  // Path SVG layer
  var pathSVG='<svg style="position:absolute;top:0;left:0;width:'+BOARD_W+'px;height:'+BOARD_H+'px;pointer-events:none;z-index:1;">'+generatePathSVG()+'</svg>';

  return '<div class="board-container" style="width:'+BOARD_W+'px;height:'+BOARD_H+'px;">'+
    decoSVG+
    '<div class="board-inner" style="width:'+BOARD_W+'px;height:'+BOARD_H+'px;">'+
    pathSVG+tiles+'<div id="player-tokens"></div></div></div>';
}

// ===== Render: Tokens =====
function renderPlayerTokens(){
  var posMap={};
  state.players.forEach(function(p){if(!posMap[p.position])posMap[p.position]=[];posMap[p.position].push(p.id);});
  var h='';
  Object.keys(posMap).forEach(function(tid){
    var ids=posMap[tid]; var c=getTileCenter(parseInt(tid));
    ids.forEach(function(pid,idx){
      var pl=state.players[pid], off=getTokenOffset(idx);
      h+='<div class="player-token" style="left:'+(c.cx+off.dx-15)+'px;top:'+(c.cy+off.dy-15)+'px;background:'+pl.color+';" data-player-id="'+pid+'" title="点击 '+pl.name+' 掷骰子">'+pl.name.charAt(0)+'</div>';
    });
  });
  return h;
}

function updatePlayerTokens(){
  var c=document.getElementById('player-tokens');
  if(c){c.innerHTML=renderPlayerTokens();bindTokenEvents();}
}

// ===== Render: Sidebar =====
function renderSidebar(){
  var plist='';
  state.players.forEach(function(p){
    var t=MAP_TILES[p.position];
    plist+='<div class="player-item" data-sidebar-player="'+p.id+'"><div class="player-dot" style="background:'+p.color+'"></div><span class="player-item-name">'+p.name+'</span><span class="player-item-pos">'+t.name+'</span></div>';
  });
  var last=state.lastRollPlayerId!==null?state.players[state.lastRollPlayerId]:null;
  var rtext=last?last.name+' 掷出了 '+state.diceValue+' 点':'点击角色掷骰子';
  return '<div class="sidebar">'+
    '<div class="sidebar-card"><div class="game-title">趣味大冒险</div><div class="hint-text">点击棋盘上的角色棋子掷骰子</div></div>'+
    '<div class="sidebar-card"><div class="dice-area"><div class="dice" id="dice">'+renderDiceFace(state.diceValue)+'</div><div class="dice-result" id="dice-result">'+rtext+'</div></div></div>'+
    '<div class="sidebar-card"><div class="setup-section-title" style="margin-bottom:.5rem;">玩家列表 <span style="font-weight:400;font-size:.7rem;color:#a8a29e;">(点击可掷骰)</span></div><div class="player-list">'+plist+'</div></div>'+
    '<div class="sidebar-card"><div class="setup-section-title" style="margin-bottom:.4rem;">地图图例</div><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#fff;border:2px solid #94a3b8;border-radius:1rem"></div>普通</div><div class="legend-item"><div class="legend-dot" style="background:#fecaca;border:2px solid #ef4444;border-radius:12% 50% 12% 50%"></div>倒退</div><div class="legend-item"><div class="legend-dot" style="background:#2563eb;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)"></div>再掷</div><div class="legend-item"><div class="legend-dot" style="background:#fde047;border:2px solid #ca8a04;border-radius:50%"></div>起/终</div></div></div></div>';
}

function renderGameScreen(){
  return '<div class="game-screen"><div class="board-area">'+renderBoard()+'</div>'+renderSidebar()+'</div>';
}

function renderVictoryOverlay(){
  if(!state.winner)return'';
  return '<div class="victory-overlay" id="victory-overlay"><div class="victory-card"><div class="victory-crown">👑</div><div class="victory-title">冠 军</div><div class="victory-name" style="color:'+state.winner.color+'">'+state.winner.name+' 获得胜利！</div><button class="restart-btn" id="restart-btn">重新开始</button></div></div>';
}

// ===== Main Render =====
function render(){
  var app=document.getElementById('app');if(!app)return;
  if(state.phase==='setup'){app.innerHTML=renderSetup();bindSetupEvents();}
  else if(state.phase==='playing'){app.innerHTML=renderGameScreen();updatePlayerTokens();bindSidebarEvents();}
  else if(state.phase==='gameover'){
    app.innerHTML=renderGameScreen();updatePlayerTokens();bindSidebarEvents();
    var ov=document.createElement('div');ov.innerHTML=renderVictoryOverlay();app.appendChild(ov.firstElementChild);
    document.getElementById('restart-btn').addEventListener('click',resetGame);
    spawnConfetti();
  }
}

// ===== Event Binding =====
function bindSetupEvents(){
  document.querySelectorAll('.count-btn').forEach(function(btn){
    btn.addEventListener('click',function(){selectedCount=parseInt(btn.dataset.count||'0',10);render();});
  });
  var sb=document.getElementById('start-btn');
  if(sb)sb.addEventListener('click',startGame);
}

function bindTokenEvents(){
  document.querySelectorAll('.player-token').forEach(function(tk){
    tk.addEventListener('click',function(){rollDice(parseInt(tk.dataset.playerId||'0',10));});
  });
}

function bindSidebarEvents(){
  document.querySelectorAll('.player-item').forEach(function(el){
    el.addEventListener('click',function(){rollDice(parseInt(el.dataset.sidebarPlayer||'0',10));});
  });
}

// ===== Game Logic =====
function startGame(){
  if(selectedCount===0)return;
  var players=[];
  for(var i=0;i<selectedCount;i++){
    var inp=document.querySelector('input[data-player="'+i+'"]');
    var name=(inp&&inp.value&&inp.value.trim())||('玩家'+(i+1));
    players.push({id:i,name:name,color:PLAYER_COLORS[i],position:0});
  }
  state={phase:'playing',players:players,isRolling:false,winner:null,diceValue:1,lastRollPlayerId:null,consecutiveRolls:0};
  render();
}

async function rollDice(playerId){
  if(state.isRolling||state.phase!=='playing')return;
  var player=state.players[playerId];
  if(player.position>=TOTAL_TILES-1)return;

  state.isRolling=true;
  state.lastRollPlayerId=playerId;

  var rtk=document.querySelector('.player-token[data-player-id="'+playerId+'"]');
  if(rtk)rtk.classList.add('rolling-token');

  var diceEl=document.getElementById('dice');
  var resultEl=document.getElementById('dice-result');
  if(diceEl)diceEl.classList.add('rolling');
  if(resultEl)resultEl.textContent=player.name+' 掷骰中...';

  var result=Math.floor(Math.random()*6)+1;
  for(var i=0;i<18;i++){
    var tv=Math.floor(Math.random()*6)+1;
    if(diceEl)diceEl.innerHTML=renderDiceFace(tv);
    await delay(60+i*8);
  }

  if(diceEl){diceEl.classList.remove('rolling');diceEl.innerHTML=renderDiceFace(result);}
  state.diceValue=result;
  if(resultEl)resultEl.textContent=player.name+' 掷出了 '+result+' 点！';
  if(rtk)rtk.classList.remove('rolling-token');
  state.isRolling=false;

  await movePlayer(playerId,result);

  if(player.position>=TOTAL_TILES-1){
    player.position=TOTAL_TILES-1;updatePlayerTokens();
    state.winner=player;state.phase='gameover';render();return;
  }

  var tile=MAP_TILES[player.position];
  if(tile.type==='backward'&&tile.effect){
    await showFullscreenEffect('backward',tile.effect);
    await delay(600);
    await movePlayer(playerId,tile.effect);
    player.position=Math.max(0,player.position);
    updatePlayerTokens();updateSidebarPositions();
  }else if(tile.type==='rollAgain'){
    state.consecutiveRolls++;
    if(state.consecutiveRolls<3){
      await showFullscreenEffect('rollAgain');
      await delay(600);
      if(resultEl)resultEl.textContent=player.name+' 再掷一次！';
      state.isRolling=false;updateSidebarPositions();return;
    }
  }
  state.consecutiveRolls=0;updateSidebarPositions();
}

async function movePlayer(playerId,steps){
  var player=state.players[playerId];if(steps===0)return;
  var dir=steps>0?1:-1;
  var target=Math.max(0,Math.min(TOTAL_TILES-1,player.position+steps));
  while(player.position!==target){
    player.position+=dir;
    player.position=Math.max(0,Math.min(TOTAL_TILES-1,player.position));
    updatePlayerTokens();
    if(dir>0)showEncouragement(player.position,player.color);
    await delay(500);
  }
}

function updateSidebarPositions(){
  state.players.forEach(function(p){
    var el=document.querySelector('.player-item[data-sidebar-player="'+p.id+'"] .player-item-pos');
    var t=MAP_TILES[p.position];if(el)el.textContent=t.name;
  });
}

// ===== Encouragement =====
function showEncouragement(tileId,color){
  var bi=document.querySelector('.board-inner');if(!bi)return;
  var c=getTileCenter(tileId),txt=randEncouragement();
  var el=document.createElement('div');el.className='encouragement';el.textContent=txt;
  el.style.left=(c.cx-30)+'px';el.style.top=(c.cy-40)+'px';el.style.color=color;
  el.style.textShadow='0 0 8px '+color+'40, 0 2px 0 '+color;
  bi.appendChild(el);setTimeout(function(){el.remove();},1600);
}

// ===== Fullscreen Effect =====
async function showFullscreenEffect(type,effect){
  var el=document.createElement('div');
  el.className='fullscreen-effect '+(type==='backward'?'backward-fx':'rollagain-fx');
  if(type==='backward'){
    el.innerHTML='<div class="fx-emoji">⬅️</div><div class="fx-text">倒退 '+Math.abs(effect)+' 步</div><div class="fx-sub">太倒霉了！往回走吧～</div>';
  }else{
    el.innerHTML='<div class="fx-emoji">🎲</div><div class="fx-text">再掷一次！</div><div class="fx-sub">运气真好！再来一回～</div>';
  }
  document.body.appendChild(el);
  await delay(1600);
  el.style.transition='opacity .3s';el.style.opacity='0';
  await delay(300);el.remove();
}

// ===== Confetti =====
function spawnConfetti(){
  var colors=['#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4'];
  for(var i=0;i<60;i++){
    (function(idx){
      setTimeout(function(){
        var el=document.createElement('div');el.className='confetti';
        el.style.left=Math.random()*100+'vw';el.style.top=(-10-Math.random()*20)+'px';
        el.style.width=(6+Math.random()*8)+'px';el.style.height=(6+Math.random()*8)+'px';
        el.style.background=colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDuration=(2+Math.random()*2)+'s';
        document.body.appendChild(el);setTimeout(function(){el.remove();},4500);
      },idx*50);
    })(i);
  }
}

// ===== Reset =====
function resetGame(){
  state={phase:'setup',players:[],isRolling:false,winner:null,diceValue:1,lastRollPlayerId:null,consecutiveRolls:0};
  selectedCount=0;render();
}

// ===== Init =====
render();
</script>
